<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factor38 | Kay-Kit</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/yczM6Rzp/pixil-frame-0-50.png">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --bg: #f8f9fc; --card: #ffffff; --text: #1a202c; --primary: #0056b3; --accent: #00b4d8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.4s; overflow: hidden; }
        .app-shell { display: grid; grid-template-columns: 75px 1fr; height: 100vh; }
        
        .sidebar { background: var(--primary); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .tool-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 55px; height: 55px; border-radius: 15px; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .tool-btn:hover { background: var(--accent); transform: scale(1.05); }
        .tool-btn.active { background: white; color: var(--primary); }

        .main-content { padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; position: relative; }
        .quiz-card { background: var(--card); max-width: 650px; width: 100%; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 8px solid var(--primary); }
        
        .opt-btn { width: 100%; text-align: left; padding: 18px; margin: 12px 0; border: 2px solid #edf2f7; background: white; color: var(--text); cursor: pointer; border-radius: 12px; font-size: 16px; transition: 0.3s; }
        .opt-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .opt-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold; transform: scale(1.02); }

        .drawer { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: var(--card); box-shadow: -10px 0 30px rgba(0,0,0,0.15); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 150; padding: 25px; overflow-y: auto; }
        .drawer.open { right: 0; }

        .calc-display { background: #1a202c; color: #00ffcc; padding: 20px; text-align: right; font-size: 24px; font-family: monospace; border-radius: 10px; margin-bottom: 10px; border: 2px solid var(--primary); min-height: 40px; word-break: break-all; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-grid button { padding: 15px; border: none; border-radius: 8px; background: #edf2f7; font-weight: bold; cursor: pointer; }
        .btn-equal { background: var(--primary) !important; color: white !important; grid-column: span 2; }

        .theme-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .theme-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        
        #canvas-area { border: 2px dashed #cbd5e0; background: white; cursor: crosshair; border-radius: 12px; touch-action: none; display: block; margin: 10px 0; }
        footer { margin-top: 30px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const THEMES_DB = [

    // --- COLEÇÃO VINTAGE & RETRO ---
    { n: "80s Arcade", bg: "#2d00f7", pri: "#ff00ff", txt: "#000000" },
    { n: "Old Cassette", bg: "#3d314a", pri: "#f9844a", txt: "#000000" },

    { n: "Gothic Victorian", bg: "#1a1a1a", pri: "#800000", txt: "#000000" },

    // --- COLEÇÃO MODERN & MINIMAL ---
    { n: "Slate Professional", bg: "#0f172a", pri: "#38bdf8", txt: "#000000" },

    // --- COLEÇÃO SOFT ---
    { n: "Cozy Night", bg: "#2b2d42", pri: "#ef233c", txt: "#000000" },
    { n: "Plum Jam", bg: "#2d0032", pri: "#ff85a1", txt: "#000000" },
    { n: "Blueberry", bg: "#1a2a6c", pri: "#f5af19", txt: "#000000" },
    { n: "Evergreen", bg: "#064e3b", pri: "#ecfdf5", txt: "#000000" },
    { n: "Velvet Black", bg: "#0a0a0a", pri: "#9d0208", txt: "#000000" },
    { n: "Obsidian Lake", bg: "#0d1b2a", pri: "#415a77", txt: "#000000" },
    { n: "Galaxy Dust", bg: "#161a1d", pri: "#a4161a", txt: "#000000" },
    { n: "Stormy Sea", bg: "#212529", pri: "#34a0a4", txt: "#000000" },
    { n: "Iron Man", bg: "#780000", pri: "#ffc300", txt: "#000000" },
    { n: "Neon Mint", bg: "#000000", pri: "#00ffcc", txt: "#000000" }
];

       const QUESTOES = [
  { q: "Qual a soma dos ângulos internos de um hexágono regular?", opts: ["360°", "540°", "720°", "900°"], ans: "720°", ref: "Média - Geometria" },

  { q: "Se 5 máquinas produzem 5 parafusos em 5 minutos, quanto tempo 100 máquinas levam para fazer 100 parafusos?", opts: ["100 min", "50 min", "5 min", "1 min"], ans: "5 min", ref: "Difícil - Lógica" },

  { q: "Qual o valor de 9² - 8²?", opts: ["1", "17", "18", "81"], ans: "17", ref: "Fácil - Aritmética" },

  { q: "Quantos graus tem um ângulo reto?", opts: ["45°", "90°", "180°", "360°"], ans: "90°", ref: "Fácil - Geometria" },

  { q: "Um número x multiplicado por 0,2 é igual a 10. Qual o valor de x?", opts: ["2", "20", "50", "100"], ans: "50", ref: "Média - Álgebra" },

  { q: "Qual a terça parte de 150?", opts: ["30", "45", "50", "60"], ans: "50", ref: "Fácil - Aritmética" },

  { q: "Quantas horas há em 3 dias?", opts: ["36", "48", "72", "84"], ans: "72", ref: "Fácil - Medidas" },

  { q: "Se f(x) = x² - 1, quanto é f(4)?", opts: ["7", "15", "16", "17"], ans: "15", ref: "Média - Funções" },

  { q: "Qual o MMC de 4 e 6?", opts: ["10", "12", "24", "48"], ans: "12", ref: "Fácil - Aritmética" },

  { q: "Em um baralho de 52 cartas, qual a chance de tirar um Ás?", opts: ["1/13", "1/52", "4/13", "1/4"], ans: "1/13", ref: "Média - Probabilidade" },

  { q: "Qual o valor de x em: 3(x + 2) = 15?", opts: ["1", "3", "5", "9"], ans: "3", ref: "Média - Álgebra" },

  { q: "Quantos lados tem um dodecágono?", opts: ["10", "12", "15", "20"], ans: "12", ref: "Fácil - Geometria" },

  { q: "Qual a raiz quadrada de 144?", opts: ["10", "12", "14", "16"], ans: "12", ref: "Fácil - Raízes" },

  { q: "Quanto é 15% de 200?", opts: ["15", "20", "30", "45"], ans: "30", ref: "Fácil - Porcentagem" },

  { q: "O que é um triângulo isósceles?", opts: ["3 lados iguais", "2 lados iguais", "Nenhum lado igual", "Um ângulo de 90°"], ans: "2 lados iguais", ref: "Fácil - Geometria" },

  { q: "Qual o próximo número: 1, 1, 2, 3, 5, 8...?", opts: ["10", "12", "13", "15"], ans: "13", ref: "Média - Fibonacci" },

  { q: "Quantos minutos tem 1,5 hora?", opts: ["60", "75", "90", "100"], ans: "90", ref: "Fácil - Medidas" },

  { q: "Se um quilo de carne custa R$ 40, quanto custa 250g?", opts: ["R$ 5", "R$ 10", "R$ 15", "R$ 20"], ans: "R$ 10", ref: "Fácil - Proporção" },

  { q: "Qual o valor de 0 dividido por 5?", opts: ["0", "5", "Indeterminado", "1"], ans: "0", ref: "Fácil - Aritmética" },

  { q: "Qual o volume de um cubo de lado 3cm?", opts: ["9cm³", "18cm³", "27cm³", "81cm³"], ans: "27cm³", ref: "Média - Geometria" },

  { q: "Quantos segundos há em 5 minutos?", opts: ["150", "300", "500", "600"], ans: "300", ref: "Fácil - Medidas" },

  { q: "Qual o valor de |-5| + 3?", opts: ["-2", "2", "8", "15"], ans: "8", ref: "Fácil - Aritmética" },

  { q: "Se x² = 49 e x > 0, qual o valor de x?", opts: ["-7", "0", "7", "49"], ans: "7", ref: "Fácil - Álgebra" },

  { q: "Qual o nome de um polígono de 8 lados?", opts: ["Hexágono", "Heptágono", "Octógono", "Nonágono"], ans: "Octógono", ref: "Fácil - Geometria" },

  { q: "Quanto é 10³?", opts: ["100", "300", "1000", "10000"], ans: "1000", ref: "Fácil - Potência" },

  { q: "A terça parte do dobro de 30 é?", opts: ["10", "20", "30", "60"], ans: "20", ref: "Média - Aritmética" },

  { q: "Qual o valor de 2 + 2 * 2?", opts: ["4", "6", "8", "10"], ans: "6", ref: "Fácil - Lógica" },

  { q: "Se o raio de um círculo é 5, qual o diâmetro?", opts: ["2,5", "5", "10", "25"], ans: "10", ref: "Fácil - Geometria" },

  { q: "Quantos milímetros tem 1 metro?", opts: ["10", "100", "1000", "10000"], ans: "1000", ref: "Fácil - Medidas" },

  { q: "O número 17 é?", opts: ["Par", "Composto", "Primo", "Fatorial"], ans: "Primo", ref: "Fácil - Teoria" },

  { q: "Quanto é 100 - 37?", opts: ["53", "63", "73", "83"], ans: "63", ref: "Fácil - Aritmética" },

  { q: "Qual a área de um retângulo de base 10 e altura 5?", opts: ["15", "25", "50", "100"], ans: "50", ref: "Fácil - Geometria" },

  { q: "Se João nasceu em 1990, quantos anos ele faz em 2026?", opts: ["34", "35", "36", "37"], ans: "36", ref: "Fácil - Datas" },

  { q: "Qual a raiz cúbica de 27?", opts: ["3", "9", "13,5", "81"], ans: "3", ref: "Média - Raízes" },

  { q: "Um ângulo de 180° é chamado de?", opts: ["Agudo", "Obtuso", "Raso", "Reto"], ans: "Raso", ref: "Média - Geometria" },

  { q: "Qual o valor de 1/2 + 1/4?", opts: ["1/6", "2/6", "3/4", "1"], ans: "3/4", ref: "Média - Frações" },

  { q: "Se 4x + 2 = 18, qual o valor de x?", opts: ["2", "4", "6", "8"], ans: "4", ref: "Média - Álgebra" },

  { q: "Quantos séculos há em 1000 anos?", opts: ["1", "10", "100", "1000"], ans: "10", ref: "Fácil - Tempo" },

  { q: "Qual o suplemento de um ângulo de 70°?", opts: ["20°", "70°", "110°", "180°"], ans: "110°", ref: "Média - Geometria" },

  { q: "Quanto é 0,1 * 100?", opts: ["1", "10", "100", "0,10"], ans: "10", ref: "Fácil - Aritmética" },

  { q: "Qual o valor de 7! / 6!?", opts: ["1", "6", "7", "42"], ans: "7", ref: "Média - Fatorial" },

  { q: "Em uma caixa de 12 ovos, 1/3 estão quebrados. Quantos estão bons?", opts: ["4", "6", "8", "9"], ans: "8", ref: "Fácil - Fração" },

  { q: "Qual o dobro de 0,75?", opts: ["1,25", "1,50", "1,75", "2,00"], ans: "1,50", ref: "Fácil - Aritmética" },

  { q: "Quantos gramas há em 1,2kg?", opts: ["12", "120", "1200", "12000"], ans: "1200", ref: "Fácil - Medidas" },

  { q: "O número 0 é par ou ímpar?", opts: ["Par", "Ímpar", "Nenhum", "Ambos"], ans: "Par", ref: "Média - Teoria" },

  { q: "Qual a média aritmética de 10, 20 e 30?", opts: ["15", "20", "25", "60"], ans: "20", ref: "Fácil - Estatística" },

  { q: "Quanto é 2 elevado a 0?", opts: ["0", "1", "2", "Infinito"], ans: "1", ref: "Fácil - Potência" },

  { q: "Se um triângulo tem base 6 e altura 4, sua área é?", opts: ["10", "12", "24", "48"], ans: "12", ref: "Média - Geometria" },

  { q: "Qual a negação de 'Alguns alunos passaram'?", opts: ["Nenhum aluno passou", "Todos os alunos passaram", "Muitos alunos passaram", "Alguns alunos não passaram"], ans: "Nenhum aluno passou", ref: "Difícil - Lógica" },

  { q: "Quantas faces tem um tetraedro?", opts: ["3", "4", "5", "6"], ans: "4", ref: "Média - Geometria" }

];

        function App() {
            const [aba, setAba] = React.useState(null);
            const [calc, setCalc] = React.useState("");
            const [qIdx, setQIdx] = React.useState(0);
            const [erros, setErros] = React.useState([]);
            const [correto, setCorreto] = React.useState(false);
            const [notas, setNotas] = React.useState("");
            const drawing = React.useRef(false);

            // FUNÇÕES DO DESENHO CORRIGIDAS
            const startDrawing = (e) => {
                drawing.current = true;
                draw(e);
            };

            const stopDrawing = () => {
                drawing.current = false;
                const canvas = document.getElementById('canvas-area');
                const ctx = canvas.getContext('2d');
                ctx.beginPath();
            };

            const draw = (e) => {
                if (!drawing.current) return;
                const canvas = document.getElementById('canvas-area');
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                // Pega coordenadas de mouse ou touch
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const handleCalc = (val) => {
                if (calc === "Erro") { setCalc(val === "C" ? "" : val); return; }
                if (val === "C") setCalc("");
                else if (val === "⌫") setCalc(calc.slice(0, -1));
                else if (val === "=") {
                    try {
                        let exp = calc.replace(/x/g, "*").replace(/:/g, "/").replace(/\^/g, "**");
                        setCalc(String(eval(exp)));
                    } catch { setCalc("Erro"); }
                } else setCalc(prev => prev + val);
            };

            const responder = (opt) => {
                if (correto) return;
                if (opt === QUESTOES[qIdx].ans) {
                    setCorreto(true);
                    setTimeout(() => {
                        setQIdx((prev) => (prev + 1) % QUESTOES.length);
                        setErros([]);
                        setCorreto(false);
                    }, 2000);
                } else {
                    if (!erros.includes(opt)) setErros([...erros, opt]);
                }
            };

            const mudarTema = (t) => {
                const r = document.documentElement;
                r.style.setProperty('--bg', t.bg);
                r.style.setProperty('--primary', t.pri);
                r.style.setProperty('--text', t.txt);
            };

            return (
                <div className="app-shell">
                    <aside className="sidebar">
                        <button className={`tool-btn ${aba==='calc'?'active':''}`} onClick={()=>setAba(aba==='calc'?null:'calc')}>🖩</button>
                        <button className={`tool-btn ${aba==='draw'?'active':''}`} onClick={()=>setAba(aba==='draw'?null:'draw')}>✎</button>
                        <button className={`tool-btn ${aba==='note'?'active':''}`} onClick={()=>setAba(aba==='note'?null:'note')}>📝</button>
                        <button className={`tool-btn ${aba==='theme'?'active':''}`} onClick={()=>setAba(aba==='theme'?null:'theme')}>🎨</button>
                    </aside>

                    <main className="main-content">
                        <div className="quiz-card">
                            <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
                                <small style={{color: 'var(--primary)', fontWeight: 'bold'}}>{QUESTOES[qIdx].ref}</small>
                                <small>Questão {qIdx + 1} de {QUESTOES.length}</small>
                            </div>
                            <h2>{QUESTOES[qIdx].q}</h2>
                            {QUESTOES[qIdx].opts.map(o => (
                                <button key={o} 
                                    className={`opt-btn ${erros.includes(o) ? 'wrong' : ''} ${correto && o === QUESTOES[qIdx].ans ? 'correct' : ''}`}
                                    onClick={() => responder(o)}>{o}</button>
                            ))}
                            {correto && <p style={{color: '#22c55e', textAlign: 'center', fontWeight: 'bold'}}>✨ Mandou bem, Kay-Kit!</p>}
                        </div>
                        <footer>Desenvolvido por Kay-Kit</footer>
                    </main>

                    {/* GAVETA DESENHO CORRIGIDA */}
                    <div className={`drawer ${aba==='draw'?'open':''}`}>
                        <h3>Rascunho de Geometria</h3>
                        <canvas id="canvas-area" width="350" height="400" 
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseLeave={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={draw}
                            onTouchEnd={stopDrawing}
                        />
                        <button className="opt-btn" onClick={() => {
                            const c = document.getElementById('canvas-area');
                            c.getContext('2d').clearRect(0,0,c.width,c.height);
                        }}>Limpar Tudo</button>
                    </div>

                    <div className={`drawer ${aba==='calc'?'open':''}`}>
                        <h3>Calculadora Científica</h3>
                        <div className="calc-display">{calc || "0"}</div>
                        <div className="calc-grid">
                            {["^","⌫","C",":","x","7","8","9","-","4","5","6","+","1","2","3","0",".","="].map(b => (
                                <button key={b} className={b==="="?"btn-equal":""} onClick={()=>handleCalc(b)}>{b}</button>
                            ))}
                        </div>
                    </div>

                    <div className={`drawer ${aba==='note'?'open':''}`}>
                        <h3>Bloco de Notas</h3>
                        <textarea style={{width:'100%', height:'350px', padding:'15px', borderRadius:'10px', background:'#fffdf2'}} 
                                  value={notas} onChange={(e)=>setNotas(e.target.value)} placeholder="Kay-Kit, escreva aqui..."></textarea>
                    </div>

                    <div className={`drawer ${aba==='theme'?'open':''}`}>
                        <h3>Temas Kay-Kit</h3>
                        <div className="theme-grid">
                            {THEMES_DB.map((t, i) => (
                                <div key={i} className="theme-item" onClick={() => mudarTema(t)}>
                                    <div style={{width:20, height:20, borderRadius:'50%', background:t.pri, border:'2px solid white'}}></div>
                                    <span style={{color: 'black'}}>{t.n}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
